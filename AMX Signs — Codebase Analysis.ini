AMX Signs — Codebase Analysis
Project Overview
AMX Signs is a premium e-commerce storefront for handcrafted LED neon signs, targeting the Indian market. The stack is modern, production-grade, and vertically integrated.

Layer	Technology
Framework	Next.js 14 (App Router)
Language	TypeScript
Styling	Tailwind CSS v3 + custom CSS animations
Database / Auth	Supabase (Postgres + Row-Level Auth)
State Management	Zustand (with persist middleware)
Payments	Razorpay
Animations	Framer Motion
Email	Resend
Icons	Lucide React
Fonts	Inter, Outfit, JetBrains Mono (Google Fonts)
