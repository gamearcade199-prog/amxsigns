Key Architecture Decisions
1. Data Fetching Strategy
Homepage uses ISR (export const revalidate = 60) — content refreshes every 60s without full rebuilds.
Product data is fetched directly from Supabase using the anon client in server components.
getProducts, getProductBySlug, getProductsByCategory, getAllCategories are all in /lib/products.ts.
NOTE

lib/products.ts instantiates its own createClient directly — it does not use the shared lib/supabase.ts (browser SSR client). This duplication is intentional: server-side fetches use the plain JS client, browser-side interactions use @supabase/ssr.

2. Authentication Flow
Middleware (middleware.ts)
  └── Protected routes: /admin, /profile, /auth
      ├── /admin or /profile → redirect to /auth if no session
      └── /auth → redirect to /profile if already logged in
Header.tsx (client-side)
  └── supabase.auth.onAuthStateChange() → real-time user state
      └── checks profiles.role === 'admin' to show Admin Panel link
3. Cart State (Zustand)
Persisted to localStorage under the key amx-cart-storage.
Cart state: items[], isOpen.
Cart item: { product, quantity, selectedSize, selectedPrice }.
CartDrawer is dynamically imported (ssr: false) in layout.tsx to avoid hydration mismatches.
WhatsAppWidget is also lazy-loaded client-only.
4. Payment Flow (Razorpay)
/api/razorpay/route.ts — creates a Razorpay order server-side.
/api/razorpay/verify/ — webhook/signature verification.
Checkout page appears to be empty (/app/checkout/ has no page.tsx) — this is a gap.
5. Admin Panel
Protected by middleware (requires authenticated session + admin role in profiles table).
Dashboard shows: Total Revenue, Orders, Quotes, ~Customers (estimated as 80% of order count).
Sub-sections: Orders, Products, Coupons, Quotes.
6. Rate Limiting
Simple in-memory token bucket (/lib/rate-limit.ts) using a Map.
⚠ Caveat: In-memory rate limiting resets on every serverless function cold start — not effective in production/Edge runtime. Should be replaced with Redis or Supabase-backed limiting.
