Product Data Model
typescript
interface Product {
  id: string;
  slug: string;
  title: string;
  category: string;        // "Gaming" | "Wings" | "Cars" | "F1" | "Lifestyle"
  price: number;
  original_price?: number;
  rating: number;
  review_count: number;
  description: string;
  features: string[];
  in_stock: boolean;
  badge?: string;
  image_url?: string;
  images?: string[];
  addons?: Array<{ id: string; label: string; price: number }>;
  variants: {
    regular: { dimensions: string; price: number; original_price?: number };
    medium:  { dimensions: string; price: number; original_price?: number };
    large:   { dimensions: string; price: number; original_price?: number };
  };
}
Identified Issues & Gaps
🔴 Critical
Issue	Location	Impact
Checkout page is empty	/app/checkout/	Users cannot complete purchases — Razorpay integration is wired but no UI exists
In-memory rate limiter	/lib/rate-limit.ts	Resets on every serverless cold start; offers no real protection
Admin role check is client-side only	Header.tsx	The "Admin Panel" link visibility is controlled client-side; actual route is middleware-protected but role is fetched client-side without server validation
🟡 Moderate
Issue	Location	Impact
ProductCard discount display is wrong	ProductCard.tsx L122	Shows price * 0.8 as "get it for" but this is always 20% off regardless of actual original_price
Footer links to unimplemented pages	page.tsx	/shipping, /returns, /installation, /faq, /privacy, /terms — all 404
getAllCategories does a full table scan	lib/products.ts	No .select('category') with .distinct() — fetches all rows then de-dupes in JS
Admin "Customers" stat is fabricated	admin/page.tsx L39	Hardcoded as orderCount * 0.8 — no real user/customer count
next.config.mjs has optimizeFonts: false	next.config.mjs	Disabled to avoid build-time hang on restricted networks — should be re-enabled in CI/CD
🟢 Minor / Improvements
Issue	Location	Notes
src_backup/ directory present	root	Stale backup; should be cleaned up
neon attack mobile ui/ and neonattack ui ux/ directories	root	Design reference folders left in the project root — should be gitignored or moved
dist/ directory at root	root	Likely a leftover from a previous non-Next build
Phone number placeholder	page.tsx L207	+91 99999 99999 — not a real contact number
